<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>გაუმარ! 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans Georgian', sans-serif; background: #f5f5f0; display: flex; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }
  .app { background: white; border-radius: 20px; padding: 2rem; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); height: fit-content; text-align: center; }
  h1 { font-size: 42px; font-weight: 700; color: #111; margin-bottom: 2rem; letter-spacing: -1px; }
  .field-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  input[type="number"] { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 18px; font-family: inherit; outline: none; margin-bottom: 1.5rem; text-align: center; transition: border 0.2s; }
  input:focus { border-color: #111; }
  .btn-go { width: 100%; background: #111; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; margin-bottom: 1.5rem; }
  .btn-go:hover { opacity: 0.8; }
  .btn-go:active { transform: scale(0.98); }
  .stage { min-height: 260px; border: 1px solid #eee; border-radius: 16px; background: #fafaf8; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  .crowd { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 0.75rem; width: 100%; }
  .person { display: flex; flex-direction: column; align-items: center; gap: 2px; opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; }
  .person.show { opacity: 1; transform: translateY(0); }
  .person-head { width: 20px; height: 20px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .person-body { width: 16px; height: 10px; border-radius: 3px 3px 2px 2px; background: #c5d8fc; }
  .speech { font-size: 8px; font-weight: 700; color: #3b5bdb; background: #e8f0fe; border-radius: 3px; padding: 1px 4px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
  .person.show .speech { opacity: 1; }
  .big-shout { font-size: 38px; font-weight: 700; color: #111; opacity: 0; transform: scale(0.5); transition: opacity 0.4s, transform 0.4s; margin-top: 0.75rem; }
  .big-shout.show { opacity: 1; transform: scale(1); }
  .hint { font-size: 13px; color: #aaa; margin: auto; }
  .error { font-size: 13px; color: #e03131; margin: auto; }
  .btn-mic { width: 100%; background: #f0f0f0; color: #111; border: 1.5px solid #ddd; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-bottom: 1rem; }
  .btn-mic:hover { background: #e5e5e5; }
  .btn-mic.listening { background: #fff0f0; border-color: #e03131; color: #e03131; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .mic-status { font-size: 12px; color: #aaa; margin-bottom: 1rem; min-height: 18px; }
</style>
</head>
<body>
<div class="app">
  <h1>გაუმაარ...</h1>
  <div class="field-label">ჩაწერე ადამიანთა რაოდენობა</div>
  <input type="number" id="num-input" placeholder="მაგ: 10" min="1" max="500" />
  <button class="btn-go" onclick="doIt()">გაუმაარ 🥂</button>
  <button class="btn-mic" id="btn-mic" onclick="toggleMic()">🎤 მიკროფონი — ხმამაღლა თქვი "გაუმარ"!</button>
  <div class="mic-status" id="mic-status"></div>
  <div class="stage" id="stage">
    
  </div>
</div>

function playJos(num) {
  const layers = num <= 5 ? 1 : num <= 20 ? 2 : num <= 50 ? 3 : num <= 100 ? 4 : 5;
  const vol = num <= 5 ? 0.4 : num <= 20 ? 0.6 : num <= 100 ? 0.8 : 1.0;
  for (let i = 0; i < layers; i++) {
    const a = new Audio(sources[i]);
    a.volume = vol;
    a.play().catch(e => console.log(e));
  }
}

function doIt() {
  const num = parseInt(document.getElementById('num-input').value);
  const stage = document.getElementById('stage');

  if (!num || num < 1) { stage.innerHTML = '<span class="error">ციფრი მიუთითე!</span>'; return; }
  if (num > 500) { stage.innerHTML = '<span class="error">მაქსიმუმ 500!</span>'; return; }

  stage.innerHTML = '';
  const crowd = document.createElement('div');
  crowd.className = 'crowd';
  const shout = document.createElement('div');
  shout.className = 'big-shout';
  shout.textContent = 'ჯოს! 🙌';
  stage.appendChild(crowd);
  stage.appendChild(shout);

  const delay = num <= 20 ? 60 : num <= 50 ? 30 : num <= 100 ? 15 : num <= 200 ? 8 : 5;
  const animEnd = 30 + num * delay + 200;

  for (let i = 0; i < num; i++) {
    const p = document.createElement('div');
    p.className = 'person';
    const head = document.createElement('div'); head.className = 'person-head'; head.textContent = avatars[i % avatars.length];
    const body = document.createElement('div'); body.className = 'person-body';
    const speech = document.createElement('div'); speech.className = 'speech'; speech.textContent = 'ჯოს!';
    p.appendChild(speech); p.appendChild(head); p.appendChild(body);
    crowd.appendChild(p);
    setTimeout(() => p.classList.add('show'), 30 + i * delay);
  }

  setTimeout(() => {
    shout.classList.add('show');
    playJos(num);
  }, animEnd);
}

document.getElementById('num-input').addEventListener('keydown', e => { if (e.key === 'Enter') doIt(); });

let recognition = null;
let isListening = false;

function toggleMic() {
  if (isListening) {
    stopMic();
  } else {
    startMic();
  }
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('mic-status').textContent = 'შენი ბრაუზერი მიკროფონს არ უჭერს მხარს';
    return;
  }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('btn-mic').classList.add('listening');
    document.getElementById('btn-mic').textContent = '🔴 ვუსმენ... თქვი "Gaumar"!';
    document.getElementById('mic-status').textContent = '';
  };

  recognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const text = e.results[i][0].transcript.toLowerCase().trim();
      document.getElementById('mic-status').textContent = '🎤 გავიგე: ' + text;
      if (text.includes('gaumar') || text.includes('gamar') || text.includes('gumar') || text.includes('kumar')) {
        const num = parseInt(document.getElementById('num-input').value) || 10;
        doItWithNum(num);
      }
    }
  };

  recognition.onerror = (e) => {
    document.getElementById('mic-status').textContent = 'შეცდომა: ' + e.error;
    stopMic();
  };

  recognition.onend = () => {
    if (isListening) recognition.start();
  };

  recognition.start();
}

function stopMic() {
  isListening = false;
  if (recognition) recognition.stop();
  document.getElementById('btn-mic').classList.remove('listening');
  document.getElementById('btn-mic').textContent = '🎤 მიკროფონი — ხმამაღლა თქვი "გაუმარ"!';
  document.getElementById('mic-status').textContent = '';
}

function doItWithNum(num) {
  const stage = document.getElementById('stage');
  if (!num || num < 1) return;

  stage.innerHTML = '';
  const crowd = document.createElement('div'); crowd.className = 'crowd';
  const shout = document.createElement('div'); shout.className = 'big-shout'; shout.textContent = 'ჯოს! 🙌';
  stage.appendChild(crowd); stage.appendChild(shout);

  const delay = num <= 20 ? 60 : num <= 50 ? 30 : num <= 100 ? 15 : num <= 200 ? 8 : 5;
  const animEnd = 30 + num * delay + 200;

  for (let i = 0; i < num; i++) {
    const p = document.createElement('div'); p.className = 'person';
    const head = document.createElement('div'); head.className = 'person-head'; head.textContent = avatars[i % avatars.length];
    const body = document.createElement('div'); body.className = 'person-body';
    const speech = document.createElement('div'); speech.className = 'speech'; speech.textContent = 'ჯოს!';
    p.appendChild(speech); p.appendChild(head); p.appendChild(body);
    crowd.appendChild(p);
    setTimeout(() => p.classList.add('show'), 30 + i * delay);
  }

  setTimeout(() => { shout.classList.add('show'); playJos(num); }, animEnd);
}
